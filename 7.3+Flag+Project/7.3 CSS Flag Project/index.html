<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */
    .flag{
      width: 900px;
      height: 600px;
      background: red;
    }
    .flag > p{
      color:aliceblue;
      /* font-size: 50px; */
      justify-content: center;
      display: flex;
      margin-top: auto;
      margin-bottom: auto;
      font-size: 75px;

    }
    .flag > div{
      
      height: 200px;
      width: 900px;
      margin-top: 150px;
      justify-content: center;
      display: flex; 
      background: navy;
    }
    .flag > div > div >p{
      margin-left: 10px;
      color: black;
      font-size: 75px;
    }
    .flag > div > div {
      height: 200px;
      width: 200px;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      border-radius: 50%;
      position: relative;
    }

  </style>
